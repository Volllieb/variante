<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  body { width: 280px; font-family: -apple-system, Segoe UI, sans-serif; font-size: 13px; margin: 0; padding: 16px; color: #ededed; background: #0a0a0a; }
  h1 { font-size: 14px; margin: 0 0 4px; color: #ededed; }
  p.sub { color: rgba(237,237,237,.62); font-size: 11px; margin: 0 0 14px; }
  label { display: block; font-weight: 600; font-size: 11px; margin-bottom: 4px; color: rgba(237,237,237,.62); }
  .input-wrap { position: relative; margin-bottom: 12px; }
  input { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid rgba(255,255,255,.10); border-radius: 6px; font-size: 12px; background: #111111; color: #ededed; }
  input:focus { outline: none; border-color: rgba(255,255,255,.40); }
  input.err { border-color: #f5455c; box-shadow: 0 0 0 1px rgba(245,69,92,.30); }
  .input-msg { font-size: 11px; min-height: 16px; padding-top: 4px; }
  .input-msg.err { color: #f5455c; }
  .input-msg.ok { color: #2fd76c; }
  button { width: 100%; padding: 9px; border: none; border-radius: 6px; background: #ffffff; color: #000000; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: transparent; border: 1px solid rgba(255,255,255,.18); color: #ededed; margin-top: 6px; }
  .btn-secondary:hover { background: rgba(255,255,255,.06); opacity: 1; }
  .status { margin-top: 10px; font-size: 11px; min-height: 14px; }
  .status.ok { color: #2fd76c; }
  .status.err { color: #f5455c; }
  .hidden { display: none; }
</style>
</head>
<body>
  <h1>Pick Element</h1>
  <p class="sub">The Figma plugin opens your site automatically. This popup is the manual fallback for the Browser Extension.</p>

  <div id="view-pick">
    <label>testId</label>
    <div class="input-wrap">
      <input id="test-id" placeholder="e.g. 3f9a…" list="dl-testid" />
      <datalist id="dl-testid"></datalist>
    </div>
    <div class="input-msg" id="input-msg"></div>

    <button id="start">Pick element on page</button>
  </div>

  <div id="view-done" class="hidden">
    <p class="ok" style="font-size:12px;font-weight:600;margin-bottom:10px">✓ Element selected</p>
    <button id="reselect-btn" class="btn-secondary">⟳ New selection</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
