name: E2E Tests

on:
  push:
    branches: [master]
    paths:
      - 'ab-tool/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [master]
    paths:
      - 'ab-tool/**'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override E2E_BASE_URL (z.B. Preview-Deployment)'
        required: false
        default: ''

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      E2E_BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:3000' }}
      # Supabase — für lokale Tests (nur wenn kein E2E_BASE_URL override)
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || '' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ab-tool/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ab-tool

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
        working-directory: ab-tool

      # Statische Analyse zuerst: Typfehler und Lint-Verstöße kosten keine
      # Browser-Zeit. Beide Schritte sind blockierend — ein roter Typecheck
      # darf nicht bis in die E2E-Phase durchrutschen.
      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: ab-tool

      - name: Lint
        run: npm run lint
        working-directory: ab-tool

      # Guard gegen nicht-existente Tailwind-Utilities: `accent` wurde beim
      # Monochrom-Pivot aus dem Theme entfernt, blieb aber in 6 Dateien stehen.
      # Tailwind v4 meldet unbekannte Utilities nicht — nur ein Grep findet das.
      - name: Guard against removed design tokens
        run: |
          if grep -rnE '\b(bg|text|border|ring|accent|from|to|via)-accent\b' app components; then
            echo "::error::'accent' ist kein definiertes Theme-Token mehr (siehe docs/brandguidelines.md)."
            exit 1
          fi
        working-directory: ab-tool

      # Node-Tests vor dem Build: schnelles Feedback, keine Browser nötig.
      # resolve-host-parity schützt den Resolve-Hotpath (site_host == hostOf()).
      - name: Run Node Unit Tests
        run: npm run test:node
        working-directory: ab-tool

      - name: Build Next.js
        run: npm run build
        working-directory: ab-tool

      - name: Run E2E Smoke Tests (gegen Build)
        run: npx playwright test --project=chromium-ci --grep "@smoke"
        working-directory: ab-tool

      - name: Run E2E Auth Tests
        run: npx playwright test --project=chromium-ci --grep "@auth"
        working-directory: ab-tool
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL || '' }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD || '' }}

      - name: Run E2E Conversion Tests
        run: npx playwright test --project=chromium-ci --grep "@conversion"
        working-directory: ab-tool

      - name: Run E2E Dashboard Tests
        run: npx playwright test --project=chromium-ci --grep "@dashboard"
        working-directory: ab-tool
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL || '' }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD || '' }}

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ab-tool/playwright-report/
          retention-days: 30

      - name: Upload Test Results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ab-tool/test-results/
          retention-days: 7
