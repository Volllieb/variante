<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Workflow Animation</title>
<script src="/gsap.min.js"></script>
<style>
  :root{
    --ink:#0a0a0a;
    --card:#ffffff;
    --line:#e7e7ea;
    --muted:#9a9aa1;
    --gold:#eab308;
    --found:#22c55e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#000000;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  #scaler{width:1040px;height:600px;transform-origin:center center}
  #stage{position:relative;width:1040px;height:600px;visibility:hidden}

  /* ---------- stepper ---------- */
  .stepper{position:absolute;top:22px;left:70px;right:70px}
  .track{display:flex;gap:8px;height:5px}
  .segment{position:relative;flex:1;height:5px;border-radius:999px;background:rgba(255,255,255,.14);overflow:hidden}
  .segmentFill{position:absolute;inset:0;border-radius:999px;background:#fff;transform:scaleX(0);transform-origin:left center}
  .labels{display:flex;gap:8px;margin-top:11px}
  .stepLabel{flex:1;text-align:center;font-size:12px;font-weight:600;color:rgba(255,255,255,.35);white-space:nowrap}

  /* ---------- cards ---------- */
  .card{position:absolute;left:50%;top:54%;width:420px}
  .badge{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:27px;height:27px;border-radius:50%;background:var(--ink);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:2}
  .clip{position:relative;overflow:hidden;background:var(--card);border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.05)}
  .chrome{display:flex;align-items:center;gap:5px;padding:11px 14px;border-bottom:1px solid var(--line)}
  .dot{width:8px;height:8px;border-radius:50%;background:#dcdce0}
  .url{flex:1;margin-left:8px;background:#f2f2f4;border-radius:6px;font-size:11px;color:var(--muted);text-align:center;padding:3px 10px}
  .cardBody{padding:30px 30px 34px;text-align:center}
  .h1{font-size:27px;font-weight:700;letter-spacing:-.02em;display:inline-block;padding:3px 12px;margin:-3px -12px 12px;border-radius:8px;box-shadow:0 0 0 0 rgba(10,10,10,0)}
  .sub{font-size:14px;color:var(--muted);line-height:1.45;padding:2px 8px;margin:-2px -8px 22px;border-radius:7px;box-shadow:0 0 0 0 rgba(10,10,10,0)}
  .btnRow{display:flex;justify-content:center;gap:10px}
  .btn{font-family:inherit;font-size:13.5px;font-weight:600;border-radius:9px;padding:11px 20px;border:none;cursor:default;box-shadow:0 0 0 0 rgba(10,10,10,0)}
  .btnPrimary{background:var(--ink);color:#fff}
  .btnSecondary{background:#fff;color:var(--ink);border:1px solid var(--line)}

  /* ---------- scan line ---------- */
  .scanLine{position:absolute;left:0;right:0;top:0;height:70px;pointer-events:none;background:linear-gradient(180deg,rgba(10,10,10,0) 0%,rgba(10,10,10,.05) 35%,rgba(10,10,10,.1) 50%,rgba(10,10,10,.05) 65%,rgba(10,10,10,0) 100%)}
  .scanCore{position:absolute;left:0;right:0;top:34px;height:2px;background:var(--ink);opacity:.5;box-shadow:0 0 14px rgba(10,10,10,.35)}

  /* ---------- markers ---------- */
  .marker{position:absolute;left:0;top:0;display:flex;align-items:center;gap:7px;pointer-events:none;z-index:30}
  .markerDot{width:10px;height:10px;flex-shrink:0;border-radius:50%;background:var(--found);box-shadow:0 0 0 5px rgba(34,197,94,.18)}
  .markerTag{background:var(--ink);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;white-space:nowrap;box-shadow:0 6px 14px rgba(0,0,0,.18)}

  /* ---------- AI character ---------- */
  .aiChar{position:absolute;left:0;top:0;width:48px;height:48px;margin:-24px 0 0 -24px;border-radius:14px;background:var(--card);border:1.5px solid var(--line);box-shadow:0 8px 18px rgba(0,0,0,.2),0 2px 5px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;z-index:60;pointer-events:none}
  .aiRing{position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(10,10,10,.28);animation:aiPulse 1.8s ease-out infinite}
  @keyframes aiPulse{0%{transform:scale(.82);opacity:.9}100%{transform:scale(1.35);opacity:0}}

  /* ---------- conversion card ---------- */
  .convCard{position:absolute;left:50%;top:54%;width:560px;background:var(--card);border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.16),0 3px 10px rgba(0,0,0,.06);padding:13px 0 15px;z-index:10}
  .convTitle{text-align:center;font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .convGrid{display:flex;position:relative}
  .divider{position:absolute;left:50%;top:2px;bottom:2px;width:1px;background:var(--line)}
  .convSide{flex:1;text-align:center;padding:0 10px}
  .num{font-size:34px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1.1}
  .crown{position:absolute;top:-25px;left:calc(75% - 14px);width:28px;height:28px;z-index:11}
</style>
</head>
<body>
<div id="scaler">
  <div id="stage" data-el="stage">

    <!-- Stepper -->
    <div class="stepper">
      <div class="track">
        <div class="segment"><div class="segmentFill" data-el="seg1"></div></div>
        <div class="segment"><div class="segmentFill" data-el="seg2"></div></div>
        <div class="segment"><div class="segmentFill" data-el="seg3"></div></div>
        <div class="segment"><div class="segmentFill" data-el="seg4"></div></div>
      </div>
      <div class="labels">
        <span class="stepLabel" data-el="label1">Analyze the page</span>
        <span class="stepLabel" data-el="label2">Create a hypothesis</span>
        <span class="stepLabel" data-el="label3">Test it</span>
        <span class="stepLabel" data-el="label4">Choose the winner</span>
      </div>
    </div>

    <!-- Card A -->
    <div class="card" data-el="cardA">
      <div class="badge" data-el="badgeA">A</div>
      <div class="clip" data-el="clipA">
        <div class="chrome">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <div class="url">yoursite.com</div>
        </div>
        <div class="cardBody">
          <h1 class="h1" data-el="h1A">Grow Your Revenue</h1>
          <p class="sub" data-el="subA">Data-driven decisions, not guesswork.</p>
          <div class="btnRow">
            <button class="btn btnPrimary" data-el="ctaA">Get Started</button>
            <button class="btn btnSecondary" data-el="cta2A">Learn More</button>
          </div>
        </div>
        <div class="scanLine" data-el="scanLine"><div class="scanCore"></div></div>
      </div>
    </div>

    <!-- Card B -->
    <div class="card" data-el="cardB">
      <div class="badge" data-el="badgeB">B</div>
      <div class="clip">
        <div class="chrome">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <div class="url">yoursite.com</div>
        </div>
        <div class="cardBody">
          <h1 class="h1" data-el="h1B">Grow Your Revenue</h1>
          <p class="sub" data-el="subB">Data-driven decisions, not guesswork.</p>
          <div class="btnRow">
            <button class="btn btnPrimary" data-el="ctaB">Get Started</button>
            <button class="btn btnSecondary" data-el="cta2B">Learn More</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Markers -->
    <div class="marker" data-el="markH1"><span class="markerDot"></span><span class="markerTag">Generic headline</span></div>
    <div class="marker" data-el="markSub"><span class="markerDot"></span><span class="markerTag">Vague subheading</span></div>
    <div class="marker" data-el="markCta"><span class="markerDot"></span><span class="markerTag">Low-contrast CTA</span></div>

    <!-- Conversion card -->
    <div class="convCard" data-el="convCard">
      <svg class="crown" data-el="crown" viewBox="0 0 24 24">
        <path d="M11.562 3.266a.5.5 0 0 1 .876 0L15.39 8.87a1 1 0 0 0 1.516.294L21.183 5.5a.5.5 0 0 1 .798.519l-2.834 10.246a1 1 0 0 1-.956.735H5.81a1 1 0 0 1-.957-.735L2.02 6.02a.5.5 0 0 1 .798-.519l4.276 3.664a1 1 0 0 0 1.516-.294z" fill="var(--gold)"/>
        <path d="M5.5 20.5h13" stroke="var(--gold)" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="convTitle">Conversions</div>
      <div class="convGrid">
        <div class="convSide" data-el="sideA"><div class="num" data-el="numA">0</div></div>
        <div class="divider"></div>
        <div class="convSide"><div class="num" data-el="numB">0</div></div>
      </div>
    </div>

    <!-- AI Character (Panda) -->
    <div class="aiChar" data-el="aiChar">
      <div class="aiRing"></div>
      <svg width="32" height="32" viewBox="0 0 128 128" fill="none">
        <path d="M89 26.8148C101.437 32.6945 109.416 38.1355 118.166 51C123.656 44.1389 123.999 37.1064 114.22 27.1578C103.583 18.41 95.8626 19.6107 89 26.8148Z" fill="black" stroke="black" stroke-width="6" stroke-linejoin="round"/>
        <path d="M38 26.8148C25.563 32.6945 17.5836 38.1355 8.83371 51C3.34366 44.1389 3.00052 37.1064 12.7798 27.1578C23.4169 18.41 31.1374 19.6107 38 26.8148Z" fill="black" stroke="black" stroke-width="6" stroke-linejoin="round"/>
        <path d="M100.374 70.7676C94.6058 62.3564 84.9606 59.9934 79.127 63.7549C77.5207 64.7907 76.2455 66.2719 75.3672 68.0518C76.624 66.1783 78.7874 64.9708 81.1768 64.9707C84.9265 64.9707 88.1258 67.941 88.126 71.7988C88.126 75.6568 84.9266 78.6279 81.1768 78.6279C77.4271 78.6277 74.2285 75.6567 74.2285 71.7988C74.2285 71.7048 74.2326 71.6115 74.2363 71.5186C73.4836 75.6378 74.4387 80.5849 77.626 85.2324C83.3942 93.6436 93.0394 96.0066 98.873 92.2451C104.611 88.5452 106.134 79.1669 100.374 70.7676Z" fill="black" stroke="black" stroke-width="6" stroke-linejoin="round"/>
        <path d="M26.626 70.7676C32.3942 62.3564 42.0394 59.9934 47.873 63.7549C49.4793 64.7907 50.7545 66.2719 51.6328 68.0518C50.376 66.1783 48.2126 64.9708 45.8232 64.9707C42.0735 64.9707 38.8742 67.941 38.874 71.7988C38.874 75.6568 42.0734 78.6279 45.8232 78.6279C49.5729 78.6277 52.7715 75.6567 52.7715 71.7988C52.7715 71.7048 52.7674 71.6115 52.7637 71.5186C53.5164 75.6378 52.5613 80.5849 49.374 85.2324C43.6058 93.6436 33.9606 96.0066 28.127 92.2451C22.3894 88.5452 20.8659 79.1669 26.626 70.7676Z" fill="black" stroke="black" stroke-width="6" stroke-linejoin="round"/>
        <path d="M62.5 101C64.7803 101 66.6982 101.444 67.9336 102.029C68.3203 102.213 68.5766 102.374 68.7451 102.5C68.5766 102.626 68.3203 102.787 67.9336 102.971C66.6982 103.556 64.7803 104 62.5 104C60.2197 104 58.3018 103.556 57.0664 102.971C56.6792 102.787 56.4225 102.626 56.2539 102.5C56.4225 102.374 56.6792 102.213 57.0664 102.029C58.3018 101.444 60.2197 101 62.5 101Z" fill="black" stroke="black" stroke-width="6"/>
        <path d="M62.8148 107V112.44M62.8148 112.44C57.127 118.268 53.8914 118.767 48 112.44M62.8148 112.44C68.9431 118.349 72.2784 118.662 78 112.44" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

  </div>
</div>

<script>
(function(){
  const $ = id => document.querySelector('[data-el="' + id + '"]');
  const stage = $("stage"), scaler = document.getElementById("scaler");
  const segs = [$("seg1"),$("seg2"),$("seg3"),$("seg4")];
  const labels = [$("label1"),$("label2"),$("label3"),$("label4")];
  const cardA = $("cardA"), cardB = $("cardB"), clipA = $("clipA");
  const badgeA = $("badgeA"), badgeB = $("badgeB");
  const h1A = $("h1A"), subA = $("subA"), ctaA = $("ctaA");
  const h1B = $("h1B"), subB = $("subB"), ctaB = $("ctaB"), cta2B = $("cta2B");
  const markH1 = $("markH1"), markSub = $("markSub"), markCta = $("markCta");
  const scanLine = $("scanLine");
  const aiChar = $("aiChar");
  const convCard = $("convCard"), crown = $("crown");
  const numA = $("numA"), numB = $("numB"), sideA = $("sideA");

  /* ---- fit ---- */
  function fit(){
    const s = Math.min(1,(innerWidth-32)/1040,(innerHeight-32)/600);
    scaler.style.transform = "scale(" + s + ")";
  }
  fit();
  addEventListener("resize", fit);

  /* ---- initial states ---- */
  gsap.set([cardA,cardB,convCard],{xPercent:-50,yPercent:-50});
  gsap.set(cardB,{autoAlpha:0});
  gsap.set(convCard,{autoAlpha:0});
  gsap.set([badgeA,badgeB],{autoAlpha:0});
  gsap.set([markH1,markSub,markCta],{xPercent:-50,yPercent:-50,autoAlpha:0});
  gsap.set(scanLine,{autoAlpha:0});
  gsap.set(aiChar,{autoAlpha:0});

  /* ---- measure ---- */
  function SC(){ return stage.getBoundingClientRect().width / 1040; }
  function pt(el,dx,dy){
    dx=dx||0;dy=dy||0;
    var st=stage.getBoundingClientRect();
    var r=el.getBoundingClientRect();
    var sc=SC();
    return {x:(r.left+r.width/2-st.left)/sc+dx, y:(r.top+r.height/2-st.top)/sc+dy};
  }

  var SPLIT_OFFSET=260, HOVER_DY=-34;
  var P_H1=pt(h1A), P_SUB=pt(subA), P_CTA=pt(ctaA,30,0);
  var P_H1B=pt(h1B,SPLIT_OFFSET,HOVER_DY);
  var P_CTAB=pt(ctaB,SPLIT_OFFSET+30,HOVER_DY);
  var AI_PARK={x:P_H1.x+260, y:P_H1.y+HOVER_DY};

  gsap.set(markH1,{x:P_H1.x,y:P_H1.y});
  gsap.set(markSub,{x:P_SUB.x,y:P_SUB.y});
  gsap.set(markCta,{x:P_CTA.x,y:P_CTA.y});

  var clipRectH=clipA.getBoundingClientRect().height/SC();
  var CARD_H=clipRectH+14, CONV_Y=CARD_H/2+6;

  var GLOW_ON="0 0 0 3px rgba(10,10,10,.16)", GLOW_OFF="0 0 0 0px rgba(10,10,10,0)";
  var H1_ORIGINAL="Grow Your Revenue", SUB_ORIGINAL="Data-driven decisions, not guesswork.";
  var CTA_ORIGINAL="Get Started", CTA2_ORIGINAL="Learn More";

  function setStep(n,t){
    segs.forEach(function(seg,i){
      tl.to(seg,{scaleX:i<n?1:0,duration:.45,ease:i<n?"power2.out":"power2.in"},t);
    });
    labels.forEach(function(label,i){
      var op=i===n-1?1:i<n-1?.6:.35;
      tl.to(label,{opacity:op,duration:.3},t);
      tl.fromTo(label,{scale:1},{scale:i===n-1?1.04:1,duration:.3,ease:"back.out(2)"},t);
    });
  }

  function resetState(){
    h1B.textContent=H1_ORIGINAL;subB.textContent=SUB_ORIGINAL;
    ctaB.textContent=CTA_ORIGINAL;cta2B.textContent=CTA2_ORIGINAL;
    gsap.set(cardA,{autoAlpha:1,x:0,scale:1});
    gsap.set(cardB,{autoAlpha:0,x:0,scale:1});
    gsap.set([badgeA,badgeB],{autoAlpha:0});
    gsap.set([markH1,markSub,markCta],{autoAlpha:0});
    gsap.set(scanLine,{autoAlpha:0,y:0});
    gsap.set(aiChar,{autoAlpha:0,x:AI_PARK.x+120,y:AI_PARK.y-60});
    gsap.set(convCard,{autoAlpha:0});
    gsap.set(crown,{scale:0,rotation:-18});
    gsap.set(sideA,{opacity:1});
    gsap.set(numB,{scale:1});
    numA.textContent="0";numB.textContent="0";
    gsap.set([h1B,ctaB,cta2B],{boxShadow:GLOW_OFF,scale:1});
    segs.forEach(function(seg,i){gsap.set(seg,{scaleX:i===0?1:0})});
    labels.forEach(function(label,i){gsap.set(label,{opacity:i===0?1:.35,scale:1})});
  }

  var tl=gsap.timeline({repeat:-1,defaults:{ease:"power2.inOut"},onRepeat:resetState});
  resetState();

  /* ===== STEP 1: Analyze ===== */
  tl.fromTo(stage,{autoAlpha:0},{autoAlpha:1,duration:.45,ease:"power1.out"},0);
  tl.to(aiChar,{autoAlpha:1,x:AI_PARK.x,y:AI_PARK.y,duration:.6,ease:"power2.out"},.3);
  tl.to(scanLine,{autoAlpha:1,duration:.25},.35);
  tl.fromTo(scanLine,{y:0},{y:clipRectH,duration:1.5,ease:"power1.inOut"},.35);
  tl.to(scanLine,{autoAlpha:0,duration:.3},1.65);
  tl.to(aiChar,{y:P_H1.y+HOVER_DY,duration:.4},.75);
  tl.fromTo(markH1,{autoAlpha:0,scale:.7},{autoAlpha:1,scale:1,duration:.3,ease:"back.out(2.2)"},.8);
  tl.to(aiChar,{y:P_SUB.y+HOVER_DY,duration:.4},1.2);
  tl.fromTo(markSub,{autoAlpha:0,scale:.7},{autoAlpha:1,scale:1,duration:.3,ease:"back.out(2.2)"},1.25);
  tl.to(aiChar,{y:P_CTA.y+HOVER_DY,duration:.4},1.6);
  tl.fromTo(markCta,{autoAlpha:0,scale:.7},{autoAlpha:1,scale:1,duration:.3,ease:"back.out(2.2)"},1.65);
  tl.to({},{duration:.55},2.0);
  tl.to([markH1,markSub,markCta],{autoAlpha:0,duration:.3,stagger:.06},2.55);
  tl.to(aiChar,{autoAlpha:0,duration:.25},2.6);

  /* ===== STEP 2: Hypothesize ===== */
  tl.addLabel("hypothesis",2.95);
  setStep(2,"hypothesis");
  tl.set(cardB,{autoAlpha:1,x:0},"hypothesis");
  tl.to(cardA,{x:-SPLIT_OFFSET,duration:.85,ease:"power3.inOut"},"hypothesis");
  tl.to(cardB,{x:SPLIT_OFFSET,duration:.85,ease:"power3.inOut"},"hypothesis");
  tl.fromTo([badgeA,badgeB],{autoAlpha:0},{autoAlpha:1,duration:.35,stagger:.08},"hypothesis+=0.55");

  tl.addLabel("edit","hypothesis+=1.15");
  tl.to(aiChar,{autoAlpha:1,x:P_H1B.x,y:P_H1B.y,duration:.55,ease:"power2.out"},"edit");
  tl.to(h1B,{boxShadow:GLOW_ON,duration:.18},"edit+=0.5");
  tl.to(h1B,{autoAlpha:.25,duration:.15},"edit+=0.68");
  tl.call(function(){h1B.textContent="Grow Revenue 3x Faster"},"edit+=0.83");
  tl.to(h1B,{autoAlpha:1,duration:.2},"edit+=0.83");
  tl.to(h1B,{boxShadow:GLOW_OFF,duration:.3},"edit+=1.1");
  tl.to(aiChar,{x:P_CTAB.x,y:P_CTAB.y,duration:.5},"edit+=1.35");
  tl.to([ctaB,cta2B],{boxShadow:GLOW_ON,duration:.18,stagger:.05},"edit+=1.8");
  tl.call(function(){ctaB.textContent="Start Free Trial";cta2B.textContent="See How It Works"},"edit+=1.98");
  tl.fromTo([ctaB,cta2B],{scale:.92},{scale:1,duration:.35,ease:"back.out(2.4)"},"edit+=1.98");
  tl.to([ctaB,cta2B],{boxShadow:GLOW_OFF,duration:.3},"edit+=2.25");
  tl.to(aiChar,{autoAlpha:0,duration:.3},"edit+=2.55");

  /* ===== STEP 3: Test ===== */
  tl.addLabel("test","edit+=2.95");
  setStep(3,"test");
  tl.fromTo(convCard,{autoAlpha:0,y:CONV_Y+26,scale:.92},{autoAlpha:1,y:CONV_Y,scale:1,duration:.5,ease:"back.out(1.5)"},"test");

  tl.addLabel("count","test+=0.55");
  var cA={v:0},cB={v:0};
  tl.fromTo(cA,{v:0},{v:96,duration:2.6,ease:"power1.inOut",snap:{v:1},onUpdate:function(){numA.textContent=String(Math.round(cA.v))}},"count");
  tl.fromTo(cB,{v:0},{v:164,duration:2.6,ease:"power2.inOut",snap:{v:1},onUpdate:function(){numB.textContent=String(Math.round(cB.v))}},"count");

  tl.addLabel("win","count+=2.75");
  tl.fromTo(crown,{scale:0,rotation:-18},{scale:1,rotation:0,duration:.55,ease:"back.out(2.5)"},"win");
  tl.fromTo(numB,{scale:1},{scale:1.12,duration:.4,ease:"back.out(3)"},"win");
  tl.to(sideA,{opacity:.4,duration:.4},"win");

  /* ===== STEP 4: Winner ===== */
  tl.addLabel("winner","win+=1.25");
  setStep(4,"winner");
  tl.to(convCard,{autoAlpha:0,y:CONV_Y+14,duration:.45},"winner");
  tl.to(cardA,{autoAlpha:0,scale:.94,duration:.45},"winner");
  tl.to(badgeA,{autoAlpha:0,duration:.25},"winner");
  tl.to(cardB,{x:0,duration:.8,ease:"power3.inOut"},"winner+=0.15");
  tl.to(badgeB,{autoAlpha:0,duration:.35},"winner+=0.6");

  tl.to({},{duration:2.0});
  tl.to(stage,{autoAlpha:0,duration:.55,ease:"power1.in"});
})();
</script>
</body>
</html>
