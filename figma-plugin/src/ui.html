<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
:root {
  --bg-0: #ffffff;
  --bg-1: #f5f5f5;
  --border: rgba(0,0,0,.08);
  --text: #171717;
  --text-2: rgba(23,23,23,.58);
  --text-3: rgba(23,23,23,.36);
  --accent: #0D99FF;
  --ok: #2fd76c;
  --r: 10px;
  --rsm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 12px; color: var(--text); background: var(--bg-0);
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
.hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px 12px; flex-shrink: 0;
  background: var(--bg-0); border-bottom: 1px solid var(--border);
}
.hdr-title { flex: 1; font-size: 13px; font-weight: 600; letter-spacing: -.2px; }
.body { flex: 1; overflow-y: auto; padding: 20px 16px 16px; display: flex; flex-direction: column; gap: 12px; }
.body::-webkit-scrollbar { width: 5px; }
.body::-webkit-scrollbar-thumb { background: rgba(15,23,42,.18); border-radius: 999px; }
.btn {
  width: 100%; padding: 12px 14px; border-radius: var(--r);
  font-size: 12px; font-weight: 600; cursor: pointer; border: none; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity .15s, transform .15s;
}
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: .9; }
.btn-secondary { background: var(--bg-1); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { background: #ececec; }
.stat-card {
  background: var(--bg-1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px;
}
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
.stat-row + .stat-row { border-top: 1px solid var(--border); }
.stat-lbl { font-size: 11px; color: var(--text-2); }
.stat-val { font-size: 12px; font-weight: 600; }
.stat-val.ok { color: var(--ok); }
.loader { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 20px; color: var(--text-3); font-size: 11px; }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-title">variante</span>
</div>

<div class="body" id="body">
  <div id="default">
    <p style="font-size:13px;line-height:1.5;margin-bottom:12px;color:var(--text-2)">
      A/B testing for Figma designs. Create variants in the Dashboard, view stats here.
    </p>
    <button class="btn btn-primary" onclick="showStats()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      Show test stats
    </button>
    <button class="btn btn-secondary" onclick="openDashboard()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Create a new test
    </button>
  </div>
  <div id="stats" style="display:none">
    <button class="btn btn-secondary" onclick="showDefault()" style="width:auto;padding:6px 12px;min-height:auto;font-size:11px;margin-bottom:8px">
      Back
    </button>
    <div id="stats-content">
      <div class="loader" id="stats-loader">
        <div class="spinner"></div> Loading stats…
      </div>
    </div>
  </div>
</div>

<script>
var apiToken = ''
window.onmessage = function(e) {
  var msg = e.data && e.data.pluginMessage
  if (!msg) return
  if (msg.type === 'TOKEN') apiToken = msg.token || ''
  if (msg.type === 'STATS_RESULT') {
    document.getElementById('stats-loader').style.display = 'none'
    document.getElementById('stats-content').innerHTML = msg.html
  }
}
function openDashboard() {
  parent.postMessage({ pluginMessage: { type: 'OPEN_URL', url: 'https://tryvariante.com/dashboard?newTest=1' } }, '*')
}
function showStats() {
  document.getElementById('default').style.display = 'none'
  document.getElementById('stats').style.display = ''
  parent.postMessage({ pluginMessage: { type: 'LOAD_STATS' } }, '*')
}
function showDefault() {
  document.getElementById('stats').style.display = 'none'
  document.getElementById('default').style.display = ''
}
</script>
</body>
</html>
